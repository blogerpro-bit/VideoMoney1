<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - VidéoMoney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>🎬 VidéoMoney</h1>
        <div>
            <a href="upload.html" class="btn">Uploader</a>
            <a href="withdraw.html" class="btn">Retrait</a>
            <a href="index.html" class="btn">Déconnexion</a>
        </div>
    </nav>
    <main style="max-width: 800px;">
        <h2>Mon Tableau de Bord</h2>
        <div id="stats" style="display: flex; gap: 20px; margin: 30px 0;">
            <div style="flex:1; background: #1a1a2a; padding: 24px; border-radius: 12px; text-align: center;">
                <p style="font-size: 14px; color: #888;">Vues totales</p>
                <p id="totalViews" style="font-size: 36px; color: #00d4aa; font-weight: bold;">0</p>
            </div>
            <div style="flex:1; background: #1a1a2a; padding: 24px; border-radius: 12px; text-align: center;">
                <p style="font-size: 14px; color: #888;">Gains totaux</p>
                <p id="totalEarnings" style="font-size: 36px; color: #00d4aa; font-weight: bold;">0 XAF</p>
            </div>
            <div style="flex:1; background: #1a1a2a; padding: 24px; border-radius: 12px; text-align: center;">
                <p style="font-size: 14px; color: #888;">Disponible au retrait</p>
                <p id="availableBalance" style="font-size: 36px; color: #00ff88; font-weight: bold;">0 XAF</p>
            </div>
        </div>
        <h3>Mes vidéos</h3>
        <div id="myVideos" style="margin-top: 20px;">
            <p style="color: #888; text-align: center;">Aucune vidéo pour le moment. <a href="upload.html">Uploader une vidéo</a></p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
