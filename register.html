<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - VidéoMoney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>🎬 VidéoMoney</h1>
        <a href="index.html" class="btn">Accueil</a>
    </nav>
    <main>
        <h2>Inscription</h2>
        <form id="registerForm">
            <input type="text" id="fullname" placeholder="Nom complet" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Téléphone (ex: 691234567)" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Créer mon compte</button>
        </form>
        <p>Déjà un compte ? <a href="login.html">Connecte-toi</a></p>
    </main>
    <script src="script.js"></script>
</body>
</html>
