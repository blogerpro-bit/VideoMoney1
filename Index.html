<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Premier Site</title>

    <style>
        body{
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1{
            font-size: 40px;
            color: #38bdf8;
        }

        p{
            font-size: 20px;
        }

        button{
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: black;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background: white;
        }
    </style>
</head>

<body>

    <h1>Bienvenue sur mon site</h1>

    <p>Mon premier projet GitHub fonctionne.</p>

    <button onclick="message()">
        Clique ici
    </button>

    <script>
        function message(){
            alert("Ton site fonctionne parfaitement 🚀");
        }
    </script>

</body>
</html>
